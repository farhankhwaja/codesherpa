name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # the eval gates load real models (~750 MB, downloaded once) — cache them
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/repograph
            ~/.cache/huggingface
          key: models-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: models-${{ runner.os }}-

      - name: Install (editable, dev extras) into a venv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # the venv must be ACTIVE (its bin on PATH): the suite asserts the
      # `repograph` console script is installed and runnable
      - name: Run the full test suite
        run: |
          . .venv/bin/activate
          python -m pytest -x -q

      - name: Golden Test (explicit, per CLAUDE.md §3.3)
        run: |
          . .venv/bin/activate
          python -m pytest tests/test_golden.py -q
