name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # the eval gates load real models (~750 MB, downloaded once).
      # restore/save are SPLIT: plain actions/cache only saves on job
      # SUCCESS, so failing runs never persisted the cache and every run
      # stayed cold (slow latency gates AND the embed_memory RSS test
      # skipping at collection). The explicit save below runs `if: always()`.
      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/sherpa
            ~/.cache/huggingface
          key: models-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: models-${{ runner.os }}-

      - name: Install (editable, dev extras) into a venv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          # CPU-only torch FIRST: the default Linux wheel drags the full CUDA
          # stack (~532 MB torch + ~2.5 GB of nvidia-* wheels) onto a GPU-less
          # runner — wasted minutes and most of the ~14 GB disk the HF model
          # cache also needs
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Disk headroom for the model cache
        run: |
          df -h / | tail -1
          # fail loudly if the model cache (~750 MB) can't fit
          test "$(df --output=avail -m / | tail -1)" -gt 4096

      # the venv must be ACTIVE (its bin on PATH): the suite asserts the
      # `sherpa` console script is installed and runnable
      - name: Run the full test suite
        env:
          # Hardware calibration for the 2-core hosted runner (D41): the §13
          # latency gates are defined on reference hardware (Apple M-series,
          # p95 178 ms); this runner measured 1,764 ms, then flaked at
          # 2,083 ms vs the 2,000 ms scale-4 budget with no code change
          # (run for 5f83342, 2026-07-05) — the pre-declared D41 flake
          # policy applies: scale 5 (2,500 ms), final. A genuine ~3x
          # regression still fails. Thresholds themselves are unchanged.
          SHERPA_LATENCY_BUDGET_SCALE: "5"
        run: |
          . .venv/bin/activate
          # -rs: any skip must name itself in the log (the suite is
          # zero-skips on a warm model cache; see D41)
          python -m pytest -x -q -rs

      - name: Golden Test (explicit, per CLAUDE.md §3.3)
        run: |
          . .venv/bin/activate
          python -m pytest tests/test_golden.py -q

      # persist the model cache even when tests fail — otherwise cold runs
      # can never warm up (D41)
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.cache/sherpa
            ~/.cache/huggingface
          key: models-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
